name: ollama

services:
  tailscale:
    image: tailscale/tailscale:latest
    restart: unless-stopped
    hostname: ollama
    networks:
      - internal
    environment:
      - TS_AUTHKEY=${OLLAMA_TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SOCKET=/var/run/tailscale/tailscaled.sock
      - TS_SERVE_CONFIG=/config/serve.ollama.json
      - TS_TAILSCALED_EXTRA_ARGS=--port=0
      - TS_AUTH_ONCE=true
      - TS_ENABLE_HEALTH_CHECK=true
      - TS_LOCAL_ADDR_PORT=127.0.0.1:41234
    command: sh -c "rm -f /var/run/tailscale/tailscaled.sock && /usr/local/bin/containerboot"
    volumes:
      - ./serve.ollama.json:/config/serve.ollama.json:ro
      - tailscale-state:/var/lib/tailscale
      - tailscale-sock:/var/run/tailscale
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:41234/healthz"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    restart: unless-stopped
    networks:
      internal:
        aliases:
          - open-webui-app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - TZ=America/New_York
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - ENABLE_WEB_SEARCH=true
      - WEB_SEARCH_ENGINE=searxng
      - SEARXNG_QUERY_URL=http://searxng:8080/search?q=<query>
      - WEB_SEARCH_RESULT_COUNT=3
      - WEBUI_URL=https://ollama.spotted-barometric.ts.net
      - RAG_SYSTEM_CONTEXT=True
    volumes:
      - openwebui-data:/app/backend/data
    depends_on:
      - searxng

  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    networks:
      internal:
        aliases:
          - searxng
    volumes:
      - ./searxng:/etc/searxng:rw

volumes:
  tailscale-state:
    name: ollama_tailscale-state
  tailscale-sock:
    name: ollama_tailscale-sock
  openwebui-data:
    name: ollama_openwebui-data

networks:
  internal:
    name: ollama_internal
