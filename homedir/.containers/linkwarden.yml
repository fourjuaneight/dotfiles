name: linkwarden

services:
  tailscale:
    image: tailscale/tailscale:latest
    restart: unless-stopped
    hostname: linkwarden
    networks:
      - internal
    environment:
      - TS_AUTHKEY=${LINKWARDEN_TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SOCKET=/var/run/tailscale/tailscaled.sock
      - TS_SERVE_CONFIG=/config/serve.linkwarden.json
      - TS_TAILSCALED_EXTRA_ARGS=--port=0
      - TS_AUTH_ONCE=true
      - TS_ENABLE_HEALTH_CHECK=true
      - TS_LOCAL_ADDR_PORT=127.0.0.1:41234
    command: sh -c "rm -f /var/run/tailscale/tailscaled.sock && /usr/local/bin/containerboot"
    volumes:
      - ./serve.linkwarden.json:/config/serve.linkwarden.json:ro
      - tailscale-state:/var/lib/tailscale
      - tailscale-sock:/var/run/tailscale
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:41234/healthz"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 10s

  linkwarden:
    image: ghcr.io/linkwarden/linkwarden:latest
    restart: unless-stopped
    networks:
      internal:
        aliases:
          - linkwarden-app
    environment:
      - NEXTAUTH_SECRET=${LINKWARDEN_NEXTAUTH_SECRET}
      - NEXTAUTH_URL=https://linkwarden.spotted-barometric.ts.net/api/v1/auth
      - DATABASE_URL=postgresql://linkwarden:${LINKWARDEN_POSTGRES_PASSWORD}@postgres:5432/linkwarden
      - MEILI_HOST=http://meilisearch:7700
      - MEILI_MASTER_KEY=${LINKWARDEN_MEILI_MASTER_KEY}
      - POSTGRES_PASSWORD=${LINKWARDEN_POSTGRES_PASSWORD}
    volumes:
      - linkwarden-data:/data/data
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_started

  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    stop_grace_period: 60s
    networks:
      - internal
    environment:
      - POSTGRES_USER=linkwarden
      - POSTGRES_PASSWORD=${LINKWARDEN_POSTGRES_PASSWORD}
      - POSTGRES_DB=linkwarden
    volumes:
      - linkwarden-db:/var/lib/postgresql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "linkwarden"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  meilisearch:
    image: getmeili/meilisearch:latest
    restart: unless-stopped
    networks:
      - internal
    environment:
      - MEILI_MASTER_KEY=${LINKWARDEN_MEILI_MASTER_KEY}
      - MEILI_NO_ANALYTICS=true
    volumes:
      - linkwarden-meilisearch:/meili_data

volumes:
  tailscale-state:
    name: linkwarden_tailscale-state
  tailscale-sock:
    name: linkwarden_tailscale-sock
  linkwarden-data:
    name: linkwarden_data
  linkwarden-db:
    name: linkwarden_db
  linkwarden-meilisearch:
    name: linkwarden_meilisearch

networks:
  internal:
    name: linkwarden_internal
