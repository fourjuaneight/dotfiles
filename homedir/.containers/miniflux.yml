name: miniflux

services:
  tailscale:
    image: tailscale/tailscale:latest
    restart: unless-stopped
    hostname: miniflux
    networks:
      - internal
    environment:
      - TS_AUTHKEY=${MINIFLUX_TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SOCKET=/var/run/tailscale/tailscaled.sock
      - TS_TAILSCALED_EXTRA_ARGS=--port=0
    volumes:
      - tailscale-state:/var/lib/tailscale
      - tailscale-sock:/var/run/tailscale
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    healthcheck:
      test: ["CMD", "tailscale", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:latest
    restart: unless-stopped
    network_mode: service:tailscale
    depends_on:
      tailscale:
        condition: service_healthy
      miniflux:
        condition: service_healthy
    environment:
      - TS_SOCKET=/var/run/tailscale/tailscaled.sock
    volumes:
      - ./Caddyfile.miniflux:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
      - tailscale-sock:/var/run/tailscale:ro

  miniflux:
    image: miniflux/miniflux:latest
    restart: unless-stopped
    networks:
      internal:
        aliases:
          - miniflux-app
    healthcheck:
      test: ["CMD", "/usr/bin/miniflux", "-healthcheck", "auto"]
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      - DATABASE_URL=postgres://miniflux:${MINIFLUX_POSTGRES_PASSWORD}@db/miniflux?sslmode=disable
      - RUN_MIGRATIONS=1
      - CREATE_ADMIN=1
      - ADMIN_USERNAME=${MINIFLUX_ADMIN_USERNAME}
      - ADMIN_PASSWORD=${MINIFLUX_ADMIN_PASSWORD}

  db:
    image: postgres:18
    restart: unless-stopped
    networks:
      - internal
    env_file: .env
    environment:
      - POSTGRES_USER=miniflux
      - POSTGRES_PASSWORD=${MINIFLUX_POSTGRES_PASSWORD}
      - POSTGRES_DB=miniflux
    volumes:
      - miniflux-db:/var/lib/postgresql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "miniflux"]
      interval: 10s
      start_period: 30s

volumes:
  miniflux-db:
    name: miniflux_miniflux-db
  caddy-data:
    name: miniflux_caddy-data
  caddy-config:
    name: miniflux_caddy-config
  tailscale-state:
    name: miniflux_tailscale-state
  tailscale-sock:
    name: miniflux_tailscale-sock

networks:
  internal:
    name: miniflux_internal