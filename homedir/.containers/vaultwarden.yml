services:
  tailscale:
    image: tailscale/tailscale:latest
    restart: unless-stopped
    hostname: vaultwarden
    networks:
      - internal
    environment:
      - TS_AUTHKEY=${VAULTWARDEN_TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SOCKET=/var/run/tailscale/tailscaled.sock
    volumes:
      - tailscale-state:/var/lib/tailscale
      - tailscale-sock:/var/run/tailscale
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    healthcheck:
      test: ["CMD", "tailscale", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:latest
    restart: unless-stopped
    network_mode: service:tailscale
    depends_on:
      tailscale:
        condition: service_healthy
      vaultwarden:
        condition: service_started
    environment:
      - TS_SOCKET=/var/run/tailscale/tailscaled.sock
    volumes:
      - ./Caddyfile.vaultwarden:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
      - tailscale-sock:/var/run/tailscale:ro

  vaultwarden:
    image: vaultwarden/server:latest
    restart: unless-stopped
    networks:
      internal:
        aliases:
          - vaultwarden-app
    environment:
      - DOMAIN=${VAULTWARDEN_DOMAIN}
    volumes:
      - vw-data:/data

volumes:
  vw-data:
  caddy-data:
    name: vaultwarden_caddy-data
  caddy-config:
    name: vaultwarden_caddy-config
  tailscale-state:
    name: vaultwarden_tailscale-state
  tailscale-sock:
    name: vaultwarden_tailscale-sock

networks:
  internal:
