name: vaultwarden

services:
  tailscale:
    image: tailscale/tailscale:latest
    restart: unless-stopped
    hostname: vaultwarden
    networks:
      - internal
    environment:
      - TS_AUTHKEY=${VAULTWARDEN_TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SOCKET=/var/run/tailscale/tailscaled.sock
      - TS_SERVE_CONFIG=/config/serve.vaultwarden.json
      - TS_TAILSCALED_EXTRA_ARGS=--port=0
      - TS_AUTH_ONCE=true
      - TS_ENABLE_HEALTH_CHECK=true
      - TS_LOCAL_ADDR_PORT=127.0.0.1:41234
    command: sh -c "rm -f /var/run/tailscale/tailscaled.sock && /usr/local/bin/containerboot"
    volumes:
      - ./serve.vaultwarden.json:/config/serve.vaultwarden.json:ro
      - tailscale-state:/var/lib/tailscale
      - tailscale-sock:/var/run/tailscale
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:41234/healthz"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 10s

  vaultwarden:
    image: vaultwarden/server:latest
    restart: unless-stopped
    networks:
      internal:
        aliases:
          - vaultwarden-app
    environment:
      - DOMAIN=${VAULTWARDEN_DOMAIN}
      - ROCKET_SECRET_KEY=${VAULTWARDEN_ROCKET_SECRET_KEY}
    volumes:
      - vw-data:/data

volumes:
  vw-data:
    name: vaultwarden_vw-data
  tailscale-state:
    name: vaultwarden_tailscale-state
  tailscale-sock:
    name: vaultwarden_tailscale-sock

networks:
  internal:
    name: vaultwarden_internal
