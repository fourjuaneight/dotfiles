name: jellyfin

services:
  tailscale:
    image: tailscale/tailscale:latest
    restart: unless-stopped
    hostname: jellyfin
    networks:
      - internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - TS_AUTHKEY=${JELLYFIN_TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SOCKET=/var/run/tailscale/tailscaled.sock
      - TS_SERVE_CONFIG=/config/serve.jellyfin.json
      - TS_TAILSCALED_EXTRA_ARGS=--port=0
      - TS_AUTH_ONCE=true
      - TS_ENABLE_HEALTH_CHECK=true
      - TS_LOCAL_ADDR_PORT=127.0.0.1:41234
    command: sh -c "rm -f /var/run/tailscale/tailscaled.sock && /usr/local/bin/containerboot"
    volumes:
      - ./serve.jellyfin.json:/config/serve.jellyfin.json:ro
      - tailscale-state:/var/lib/tailscale
      - tailscale-sock:/var/run/tailscale
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:41234/healthz"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  tailscale-state:
    name: jellyfin_tailscale-state
  tailscale-sock:
    name: jellyfin_tailscale-sock

networks:
  internal:
    name: jellyfin_internal
